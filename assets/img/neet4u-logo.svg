<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon container -->
  <rect x="0" y="10" width="100" height="100" rx="22" fill="url(#iconGrad)" />

  <!-- ActivitySquare icon (ECG/pulse line inside a square) -->
  <!-- Outer square outline inside the rounded box -->
  <rect x="18" y="28" width="64" height="64" rx="10" fill="none" stroke="white" stroke-width="5" opacity="0.4"/>
  <!-- ECG pulse line -->
  <polyline
    points="22,60 34,60 40,35 48,82 56,45 62,60 78,60"
    fill="none"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Brand name: NEET4U -->
  <text x="116" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="52" letter-spacing="-2" fill="url(#logoGrad)">NEET4U</text>

  <!-- Subtitle: Counselling Intelligence -->
  <text x="118" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600" font-size="14" letter-spacing="4" fill="#64748b" text-transform="uppercase">COUNSELLING INTELLIGENCE</text>
</svg>

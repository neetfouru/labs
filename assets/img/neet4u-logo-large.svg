<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8" />
      <stop offset="100%" style="stop-color:#0284c7" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9" />
      <stop offset="100%" style="stop-color:#0369a1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0ea5e9" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Icon box with shadow -->
  <rect x="0" y="15" width="150" height="150" rx="32" fill="url(#bgGrad)" filter="url(#shadow)" />

  <!-- ECG pulse icon -->
  <rect x="24" y="39" width="102" height="102" rx="16" fill="none" stroke="white" stroke-width="6" opacity="0.35"/>
  <polyline
    points="30,90 50,90 62,48 76,128 90,62 102,90 120,90"
    fill="none"
    stroke="white"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- NEET4U wordmark -->
  <text
    x="172" y="108"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="900"
    font-size="80"
    letter-spacing="-3"
    fill="url(#textGrad)"
  >NEET4U</text>

  <!-- Beta badge -->
  <rect x="172" y="116" width="52" height="20" rx="5" fill="#0ea5e9" opacity="0.15"/>
  <text x="176" y="130" font-family="sans-serif" font-weight="700" font-size="11" fill="#0284c7" letter-spacing="1">beta</text>

  <!-- Tagline -->
  <text
    x="174" y="152"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="600"
    font-size="16"
    letter-spacing="5"
    fill="#64748b"
  >COUNSELLING INTELLIGENCE</text>
</svg>
